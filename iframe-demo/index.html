<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./index.css">
    <script src="./index.mjs" type="module" defer></script>
    <title>iframe Demo</title>
</head>
<body class="p-4 d-flex flex-auto flex-column h-100">
<h2 class="display-4">Iframe Demo</h2>
<div id="wrapper">
    <div class="sidebar p-4">
        <div class="card shadow mb-3">
            <div class="card-header">
                Options
            </div>
            <div class="card-body">
                <div class="option">
                    <label for="disableBundleListSidebarOption">Disable sidebar</label> <input type="checkbox"
                                                                                               id="disableBundleListSidebarOption"/>
                </div>
                <div class="option">
                    <label for="saveToWindowParentOption">Save to window parent</label> <input type="checkbox"
                                                                                               id="saveToWindowParentOption"/>
                </div>
                <div class="mb-2">
                    <label for="labelTypeOption" class="form-label">Label type:</label>
                    <input class="form-control form-control-sm" type="text" placeholder="label type"
                           id="labelTypeOption">
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="listenForMessagesOption">
                    <label class="form-check-label" for="listenForMessagesOption">
                        Listen for messages
                    </label>
                </div>
                <div id="fileInputs" style="display:none;" class="mt-2">
                    <div class="mb-2">
                        <label for="audioFileOption" class="form-label">Audio file:</label>
                        <input class="form-control form-control-sm" id="audioFileOption" type="file">
                    </div>
                    <div class="mb-2">
                        <label for="transcriptFileOption" class="form-label">Transcript file:</label>
                        <input class="form-control form-control-sm" id="transcriptFileOption" type="file">
                    </div>
                </div>
            </div>
            <div class="card-footer">
                <button id="applyButton" class="btn btn-sm btn-primary">Apply Options</button>
            </div>
        </div>

        <div class="card shadow mb-3">
            <div class="card-header">
                Styles
            </div>
            <div class="card-body">
                <p id="styleBlockingMessage">Check "listen for messages" option and click "Apply options" first.</p>

                <div style="display: none;" id="styleOptions" class="list-group">
                </div>
                <div class="mt-3" id="spectrogramOptionsWrapper" style="display:none;">
                    <div class="mb-2 fw-bold">Spectrogram - Heatmap Colors</div>
                    <div class="list-group px-0" id="spectrogramOptions">
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="iframe-wrapper flex">
        <iframe class="flex"></iframe>
    </div>
    <div class="clearfix"></div>
</div>
</body>
</html>
